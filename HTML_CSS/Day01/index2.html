<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Position</title>
  </head>
  <style>
    .box {
      position: relative;
    }
    .box1 {
      border: 1px solid red;
      width: 100px;
      height: 100px;
      position: sticky;
      top: 0;
    }
  </style>
  <body>
    <div class="box">
      <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptatum
        dolores mollitia velit repellat, enim itaque nihil voluptate aliquam
        quidem qui omnis quas animi cupiditate, tempore dolor odit accusamus
        nisi! Hic!
      </p>
      <div class="box1">Box 1</div>
      <p>Cuộn xuống để thấy sticky</p>
      <p></p>
    </div>
  </body>
</html>
